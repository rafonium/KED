// ============================================================================
// KED MODDER INTEGRATION TEMPLATE
// ============================================================================
// This file provides examples and documentation for integrating third-party 
// engines with the Kerbal Engine Dynamics (KED) Operational Maturity System.
//
// You can use ModuleManager patches to override KED automatic detection.
// ============================================================================

// --- 1. ARCHETYPE OVERRIDE ---
// Use the 'archetype' field to force an engine into a specific progression roadmap.
// Valid Archetypes:
// - Monopropellant : Low complexity, high reliability baseline.
// - Hypergolic     : Storable, reliable, but moderate failure risk.
// - Bipropellant   : Standard liquid engines (LFO).
// - Nuclear        : High tech, sensitive to startup cycles, expensive repairs.
// - Electric       : Ion/Plasma. Extremely high reliability, low thrust.
// - Airbreathing   : Jet engines. Specific mastery milestones.
// - Exotic         : Near-future tech (Antimatter, Fusion). Very complex.
// - Advanced       : High-ISP engines.
// - Solid          : Single-use, high vibration, cascade risk.
// - Thermodynamic  : Standard fallback category.

@PART[YourEngineName]:FOR[KED]
{
    @MODULE[KEDModule]
    {
        // Forces KED to treat this engine as Nuclear regardless of its resources.
        %archetype = Nuclear
    }
}


// --- 2. ATMOSPHERIC SENSITIVITY OVERRIDE (ASI) ---
// KED automatically calculates ASI based on the Vacuum/ASL ISP ratio.
// Use 'atmSensitivityIndex' to manually define this sensitivity.
// Values > 1.5 indicate high-vacuum optimization (sensitive to pressure).
// Values near 1.0 indicate sea-level optimization (pressure-hardened).

@PART[YourEngineName]:FOR[KED]
{
    @MODULE[KEDModule]
    {
        // Forces a specific ASI value.
        %atmSensitivityIndex = 1.05
    }
}


// --- 3. BQS (BATCH QUALITY SYSTEM) HINTS ---
// If you want to add custom flavor text for specific failure hints in the PAW,
// KED currently handles this internally, but future versions will support
// localized strings or custom hint tables per part.
