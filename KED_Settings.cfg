KED_SETTINGS
{
    // ==========================================
    // PROGRESSION SETTINGS (OMS)
    // ==========================================
    
    // ProgressionRate (%)
    // Global multiplier for Maturity Points (MP) gain.
    // 100 = Standard progression (Default).
    // 200 = Double speed progression.
    // 50  = Hard mode (Half speed).
    ProgressionRate = 100

    // RecoveryMP (Whole Number)
    // MP awarded when a part is recovered after a successful flight.
    // Default: 5
    RecoveryMP = 5

    // IgnitionStartMP (Whole Number)
    // MP awarded for the first successful ignition in a flight.
    // Default: 1
    IgnitionStartMP = 1

    // FullBurnMP (Whole Number)
    // MP awarded after an engine has burned for 60 cumulative seconds in one flight.
    // Default: 2
    FullBurnMP = 2

    // HeritageEfficiency (%)
    // The percentage of MP transferred from mature engines to new engines of the same archetype.
    // Higher values make unlocking new parts easier if you have already mastered similar ones.
    // Default: 20
    HeritageEfficiency = 20

    // ==========================================
    // RELIABILITY & DIFFICULTY SETTINGS
    // ==========================================

    // GlobalFailureRisk (%)
    // Global multiplier for all engine failure probabilities.
    // 100 = Realistic/Standard risk (Default).
    // 50  = Safer engines.
    // 200 = High risk.
    GlobalFailureRisk = 100
    
    // DebugMode (True/False)
    // Enables the developer debug suite in the Part Action Window.
    // Default: False
    DebugMode = False

    // BatchFailureStep (%)
    // Default: 5
    BatchFailureStep = 5

    // BatchImprovementStep (%)
    // The amount of risk removed from a specific part''s lineage after a successful "Good" batch.
    // Default: 2
    BatchImprovementStep = 2

    // AgingSensitivity (Scale 1-10)
    // How fast engines lose reliability after reaching the AgingThreshold.
    // 1  = Very slow decay.
    // 5  = Standard decay (Default).
    // 10 = Rapid decay.
    AgingSensitivity = 5

    // EnableAging (True/False)
    // If True, engine models will gradually become less reliable after they pass the AgingThreshold.
    // If False, engines maintain their base reliability regardless of how many times they have been flown.
    // Default: True
    EnableAging = True

    // AgingThreshold (Flights)
    // The number of total flights a specific engine model (e.g. "Reliant") can perform 
    // before the "Aging" effect kicks in. Before this number, the engine is in its "Prime".
    // After this number, every flight increases the chance of future batches being "Lemons".
    // NOTE: Only takes effect if EnableAging is True.
    // Default: 50
    AgingThreshold = 50

    // IgnitionFailureBase (%)
    // Base probability of an ignition failure due to engine fatigue.
    // Default: 1
    IgnitionFailureBase = 1

    // SRBGracePeriod (Seconds)
    // The amount of time after launch where Solid Rocket Boosters are guaranteed safe from casing breaches.
    // Default: 10
    SRBGracePeriod = 10

    // ==========================================
    // MATURITY THRESHOLDS (MP)
    // ==========================================
    // These define how many Maturity Points are needed to reach each level.
    // L1, L2, L3, L4 correspond to the mastery levels of each archetype.

    MATURITY_THRESHOLDS
    {
        MONOPROP      { L1 = 60;  L2 = 150; L3 = 300 }
        HYPERGOLIC    { L1 = 60;  L2 = 150; L3 = 300 }
        BIPROP        { L1 = 100; L2 = 250; L3 = 500; L4 = 1000 }
        NUCLEAR       { L1 = 50;  L2 = 120 }
        ELECTRIC      { L1 = 50;  L2 = 120 }
        AIRBREATHER   { L1 = 80;  L2 = 200; L3 = 450 }
        EXOTIC        { L1 = 30 }
        ADVANCED      { L1 = 100; L2 = 250; L3 = 500; L4 = 1000 }
        SOLID         { L1 = 40;  L2 = 80 }
        THERMO        { L1 = 100; L2 = 250; L3 = 500; L4 = 1000 }
    }
}
