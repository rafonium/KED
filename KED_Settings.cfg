            DIAGNOSTICS { L0 = -1; L1 = -1; L2 = 0; L3 = 0; L4 = 0; L5 = 0 }
            RETROFIT    { L0 = -1; L1 = -1; L2 = 5; L3 = 5; L4 = 5; L5 = 5 }
