KED_SETTINGS
{
    // Global multiplier for all engine failure probabilities. 
    // Lower = safer (e.g., 0.5 is half risk), Higher = riskier (e.g., 2.0 is double risk).
    globalRiskMultiplier = 1.0
    
    // Multiplier for the SRB grace period (time after launch before casing checks begin).
    // Higher = longer safe time during liftoff.
    srbGracePeriodMultiplier = 1.0
    
    // Multiplier for Monopropellant catalyst service limit. 
    // Higher = engines last longer before starting to choke.
    monoServiceLimitMultiplier = 1.0
    
    // Multiplier for the amount of CTU (Cumulative Test Units) gained from flights, telemetry, and inspections.
    // Higher = faster progression through the Block certification levels.
    ctuYieldMultiplier = 1.0
}
